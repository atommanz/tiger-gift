<!DOCTYPE html>
<html>
<head>
  <title>Debug LocalStorage</title>
  <style>
    body {
      font-family: system-ui;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    pre {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
    }
    button {
      padding: 10px 20px;
      background: black;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 5px;
    }
    button:hover {
      background: #333;
    }
  </style>
</head>
<body>
  <h1>🔍 Debug Tiger Gift Form Data</h1>

  <button onclick="checkStorage()">🔄 Refresh Data</button>
  <button onclick="clearStorage()">🗑️ Clear Storage</button>
  <button onclick="setTestData()">🧪 Set Test Data</button>

  <h2>Current Form Data:</h2>
  <pre id="output">Click "Refresh Data" to see storage</pre>

  <script>
    function checkStorage() {
      const data = localStorage.getItem('tiger-gift-form')
      const output = document.getElementById('output')

      if (data) {
        try {
          const parsed = JSON.parse(data)
          output.textContent = JSON.stringify(parsed, null, 2)

          // Show summary
          let summary = '\n\n=== Summary ===\n'
          Object.keys(parsed).forEach(key => {
            const value = parsed[key]
            summary += `${key}: ${Array.isArray(value) ? value.length + ' items' : 'N/A'}\n`
          })
          output.textContent += summary
        } catch (e) {
          output.textContent = 'Error parsing data: ' + e.message + '\n\nRaw: ' + data
        }
      } else {
        output.textContent = '❌ No form data found in localStorage'
      }
    }

    function clearStorage() {
      localStorage.removeItem('tiger-gift-form')
      alert('✅ Storage cleared!')
      checkStorage()
    }

    function setTestData() {
      const testData = {
        gender: ["G02"],
        age: ["A03"],
        relationship: ["R02", "R03"],
        occasion: ["O01"],
        budget: ["B01"],
        style: ["S01", "S02"]
      }
      localStorage.setItem('tiger-gift-form', JSON.stringify(testData))
      alert('✅ Test data set!')
      checkStorage()
    }

    // Auto-check on load
    checkStorage()
  </script>
</body>
</html>
